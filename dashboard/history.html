<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Conversation History — Mission Control</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --purple: #bc8cff;
  --user-bg: #1a3a5c; --system-bg: #1c1c2e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--card); }
.topbar-title { font-size: 20px; font-weight: 700; }
.topbar-title a { color: var(--text-dim); text-decoration: none; font-size: 14px; margin-right: 12px; }
.topbar-title a:hover { color: var(--blue); }

.stats-bar { display: flex; gap: 24px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--card); color: var(--text-dim); font-size: 13px; }
.stats-bar span { color: var(--text); font-weight: 600; }

.controls { display: flex; gap: 12px; padding: 16px 24px; align-items: center; flex-wrap: wrap; }
.controls input, .controls select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.controls input { flex: 1; min-width: 200px; }
.controls select { min-width: 150px; }

.messages { max-width: 900px; margin: 0 auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; }

.load-more { text-align: center; padding: 12px; }
.load-more button, .show-more-btn { background: var(--card); border: 1px solid var(--border); color: var(--blue); padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.load-more button:hover, .show-more-btn:hover { background: var(--border); }

.msg { padding: 10px 14px; border-radius: 10px; max-width: 80%; word-wrap: break-word; position: relative; }
.msg-wrapper { display: flex; flex-direction: column; }
.msg-wrapper.user { align-items: flex-end; }
.msg-wrapper.assistant { align-items: flex-start; }
.msg-wrapper.system { align-items: center; }

.msg.user { background: var(--user-bg); border: 1px solid #1f4e79; }
.msg.assistant { background: var(--card); border: 1px solid var(--border); }
.msg.system { background: var(--system-bg); border: 1px solid #2a2a4a; color: var(--text-dim); font-style: italic; max-width: 90%; }
.msg.current-session { box-shadow: 0 0 0 1px var(--green); }

.msg-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; padding: 0 4px; }
.msg-meta .role { font-weight: 600; text-transform: uppercase; }
.msg-meta .role.user { color: var(--blue); }
.msg-meta .role.assistant { color: var(--purple); }

.msg-content { white-space: pre-wrap; line-height: 1.5; font-size: 13px; }
.msg-content.truncated { max-height: 200px; overflow: hidden; position: relative; }

.tool-calls { margin-top: 8px; }
.tool-call { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px; margin-top: 4px; font-size: 12px; }
.tool-call summary { padding: 6px 10px; cursor: pointer; color: var(--text-dim); }
.tool-call summary:hover { color: var(--text); }
.tool-call-body { padding: 8px 10px; white-space: pre-wrap; word-break: break-all; color: var(--text-dim); max-height: 300px; overflow: auto; }

.session-divider { text-align: center; padding: 16px 0; color: var(--text-dim); font-size: 12px; position: relative; }
.session-divider::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; border-top: 1px solid var(--border); }
.session-divider span { background: var(--bg); padding: 0 12px; position: relative; z-index: 1; }

.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title"><a href="/dashboard/">← Back to Dashboard</a> 💬 Conversation History</div>
</div>

<div class="stats-bar" id="stats">Loading...</div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Search messages..." />
  <select id="sessionFilter"><option value="">All Sessions</option></select>
</div>

<div class="load-more" id="loadMoreTop" style="display:none"><button onclick="loadMore()">⬆ Load older messages</button></div>
<div class="messages" id="messages"><div class="empty"><div class="spinner"></div><br>Loading history...</div></div>

<script>
const API = '';
let allData = null;
let currentOffset = 0;
const PAGE_SIZE = 50;
let searchTimeout = null;

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toEST(ts) {
  return new Date(ts).toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
}

function renderMessages(messages, currentSessionId, append) {
  const container = document.getElementById('messages');
  if (!append) container.innerHTML = '';
  
  let lastSessionId = null;
  
  for (const msg of messages.reverse()) {
    if (msg.sessionId !== lastSessionId) {
      const div = document.createElement('div');
      div.className = 'session-divider';
      const isCurrent = msg.sessionId === currentSessionId;
      div.innerHTML = `<span>${isCurrent ? '🟢 Current Session' : '📋 Session'} · ${msg.sessionId.substring(0,8)}... · ${toEST(msg.timestamp)}</span>`;
      container.appendChild(div);
      lastSessionId = msg.sessionId;
    }
    
    const wrapper = document.createElement('div');
    wrapper.className = `msg-wrapper ${msg.role}`;
    
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `<span class="role ${msg.role}">${msg.role}</span> · ${toEST(msg.timestamp)}`;
    
    const bubble = document.createElement('div');
    bubble.className = `msg ${msg.role}${msg.sessionId === currentSessionId ? ' current-session' : ''}`;
    
    const contentText = msg.content || '';
    const truncated = contentText.length > 500;
    const contentDiv = document.createElement('div');
    contentDiv.className = `msg-content${truncated ? ' truncated' : ''}`;
    contentDiv.textContent = truncated ? contentText.substring(0, 500) + '...' : contentText;
    bubble.appendChild(contentDiv);
    
    if (truncated) {
      const btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = 'Show more';
      btn.onclick = () => {
        if (contentDiv.classList.contains('truncated')) {
          contentDiv.classList.remove('truncated');
          contentDiv.textContent = contentText;
          btn.textContent = 'Show less';
        } else {
          contentDiv.classList.add('truncated');
          contentDiv.textContent = contentText.substring(0, 500) + '...';
          btn.textContent = 'Show more';
        }
      };
      bubble.appendChild(btn);
    }
    
    if (msg.toolCalls && msg.toolCalls.length > 0) {
      const tcDiv = document.createElement('div');
      tcDiv.className = 'tool-calls';
      for (const tc of msg.toolCalls) {
        const details = document.createElement('details');
        details.className = 'tool-call';
        const label = tc.name === 'result' ? `📤 Tool Result (${tc.id?.substring(0,8) || '?'})` : `🔧 ${tc.name}`;
        details.innerHTML = `<summary>${escapeHtml(label)}</summary><div class="tool-call-body">${escapeHtml(tc.args || tc.result || '')}</div>`;
        tcDiv.appendChild(details);
      }
      bubble.appendChild(tcDiv);
    }
    
    wrapper.appendChild(meta);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
  }
}

async function fetchHistory(offset = 0, append = false) {
  const search = document.getElementById('search').value;
  const session = document.getElementById('sessionFilter').value;
  const params = new URLSearchParams({ limit: PAGE_SIZE, offset, search, session });
  
  try {
    const res = await fetch(`${API}/api/history?${params}`);
    const data = await res.json();
    allData = data;
    currentOffset = offset + data.messages.length;
    
    // Stats
    document.getElementById('stats').innerHTML = `Total: <span>${data.total}</span> messages · Sessions: <span>${data.sessions.length}</span> · Current: <span>${data.currentSessionId?.substring(0,8) || 'none'}...</span>`;
    
    // Session filter dropdown
    if (!append) {
      const sel = document.getElementById('sessionFilter');
      const current = sel.value;
      sel.innerHTML = '<option value="">All Sessions</option>';
      for (const s of data.sessions) {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.id.substring(0,8)}... (${toEST(s.mtime)})`;
        if (s.id === data.currentSessionId) opt.textContent += ' 🟢';
        sel.appendChild(opt);
      }
      sel.value = current;
    }
    
    // Messages
    if (data.messages.length === 0 && !append) {
      document.getElementById('messages').innerHTML = '<div class="empty">No messages found</div>';
    } else {
      renderMessages(data.messages, data.currentSessionId, append);
    }
    
    // Load more button
    document.getElementById('loadMoreTop').style.display = currentOffset < data.total ? '' : 'none';
  } catch (e) {
    document.getElementById('messages').innerHTML = `<div class="empty">Error: ${escapeHtml(e.message)}</div>`;
  }
}

function loadMore() { fetchHistory(currentOffset, true); }

document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentOffset = 0; fetchHistory(0); }, 300);
});
document.getElementById('sessionFilter').addEventListener('change', () => { currentOffset = 0; fetchHistory(0); });

fetchHistory(0);
</script>
</body>
</html>
